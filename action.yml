name: 'OpsGuard AI Security Gate'
description: >
  Context-aware security gate for DevOps pipelines. Blocks PRs containing
  secrets, SQL injections, logic backdoors and supply-chain attacks using a
  hybrid Regex + LLM two-gate engine.
author: 'Óscar Sánchez Pérez'

branding:
  icon: 'shield'
  color: 'red'

inputs:
  openrouter-api-key:
    description: 'OpenRouter API key for Gate 2 semantic analysis (required).'
    required: true
  risk-threshold:
    description: 'Minimum risk score (0–10) to block the pipeline. Default: 7.'
    required: false
    default: '7'
  model:
    description: 'LLM model identifier (via OpenRouter) for Gate 2 analysis.'
    required: false
    default: 'google/gemini-2.0-flash-001'
  telemetry-mode:
    description: 'Telemetry verbosity: verbose | summary | silent.'
    required: false
    default: 'verbose'

runs:
  using: 'composite'
  steps:
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Poetry and OpsGuard dependencies
      shell: bash
      run: |
        curl -sSL https://install.python-poetry.org | python3 -
        export PATH="$HOME/.local/bin:$PATH"
        cd "${{ github.action_path }}"
        poetry config virtualenvs.in-project true
        poetry install --no-interaction --without dev

    - name: Run OpsGuard Security Scan
      shell: bash
      env:
        OPENROUTER_API_KEY: ${{ inputs.openrouter-api-key }}
        OPSGUARD_RISK_THRESHOLD: ${{ inputs.risk-threshold }}
        OPSGUARD_MODEL: ${{ inputs.model }}
        OPSGUARD_TELEMETRY_MODE: ${{ inputs.telemetry-mode }}
      run: '"${{ github.action_path }}/.venv/bin/opsguard" scan'
