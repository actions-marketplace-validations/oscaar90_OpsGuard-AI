name: OpsGuard Security Gate 🛡️

on:
  pull_request:
    types: [opened, synchronize, reopened]
  # Note: adding 'push' here would trigger the workflow on direct pushes,
  # but OpsGuard will exit cleanly via SkipScanSignal (non-PR events are skipped).
  # PR-only triggering is the recommended configuration.

jobs:
  security-audit:
    name: 🕵️‍♂️ Semantic Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required: full history needed to compare PR base and head SHAs
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Dependencies
        run: poetry install --no-interaction --sync

      - name: Run OpsGuard AI Scan
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPSGUARD_RISK_THRESHOLD: 7
        run: |
          poetry run opsguard scan